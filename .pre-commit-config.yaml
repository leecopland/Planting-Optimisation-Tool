repos:
# ── Backend ───────────────────────────────────────────────────────────────────
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

-   repo: local
    hooks:
      - id: pytest-backend
        name: pytest (backend)
        entry: just -f backend/justfile test
        language: system
        files: ^backend/
        pass_filenames: false

# ── Datascience ───────────────────────────────────────────────────────────────
      - id: ruff-check-datascience
        name: ruff check (datascience)
        entry: uv run --directory datascience ruff check --fix
        language: system
        files: ^datascience/
        types: [python]
        pass_filenames: false
      - id: ruff-format-datascience
        name: ruff format (datascience)
        entry: uv run --directory datascience ruff format .
        language: system
        files: ^datascience/
        types: [python]
        pass_filenames: false
      - id: pytest-datascience
        name: pytest (datascience)
        entry: uv run --directory datascience pytest
        language: system
        files: ^datascience/
        pass_filenames: false

# ── GIS ───────────────────────────────────────────────────────────────────────
      - id: ruff-check-gis
        name: ruff check (gis)
        entry: uv run --directory gis ruff check --fix
        language: system
        files: ^gis/
        types: [python]
        pass_filenames: false
      - id: ruff-format-gis
        name: ruff format (gis)
        entry: uv run --directory gis ruff format .
        language: system
        files: ^gis/
        types: [python]
        pass_filenames: false
      - id: pytest-gis
        name: pytest (gis)
        entry: uv run --directory gis pytest
        language: system
        files: ^gis/
        pass_filenames: false
