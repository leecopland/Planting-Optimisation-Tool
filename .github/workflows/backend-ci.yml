# This workflow will install Python dependencies, run tests and lint with a single version of Python


name: POT Back-end Testing


on:
  push:
    branches-ignore: ["master"]
  pull_request:
    branches: ["master"]


permissions:
  contents: read
  pull-requests: write


jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # ====================================================================
    # DATABASE SERVICE
    # ====================================================================
    services:
      postgres_db:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: POT_db
        ports:
          - 5432:5432
        options: "--health-cmd \"pg_isready -U postgres\" --health-interval 10s --health-timeout 5s --health-retries 5"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.9.11"
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Cache virtualenv
      uses: actions/cache@v4
      with:
        path: backend/.venv
        key: venv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}

    - name: Install Backend dependencies
      run: uv sync

    # ====================================================================
    # 1. LINT AND FORMAT
    # ====================================================================
    - name: Lint with ruff
      run: uv run ruff check .

    - name: Format check with ruff
      run: uv run ruff format --check .

    # ====================================================================
    # 2. DATABASE SETUP
    # ====================================================================
    - name: Set DB Environment Variables for CI
      run: |
        echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=devpassword" >> $GITHUB_ENV
        echo "POSTGRES_DB=POT_db" >> $GITHUB_ENV
        echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
        echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
        # Points at POT_db for alembic; the test step overrides this to pot_test_db
        echo "DATABASE_URL=postgresql+asyncpg://postgres:devpassword@localhost:5432/POT_db" >> $GITHUB_ENV

    - name: Enable PostGIS Extension
      run: |
        PSQL_URI="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
        psql $PSQL_URI -c "CREATE EXTENSION IF NOT EXISTS postgis;"
        echo "PostGIS extension successfully enabled."

    - name: Apply Alembic Migrations
      run: uv run alembic upgrade head

    - name: Seed Reference Data
      run: uv run python -m src.scripts.seed_references

    - name: Sync Sequences After Seeding
      run: |
        PSQL_URI="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
        psql $PSQL_URI -c "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN (SELECT table_name, column_name FROM information_schema.columns WHERE column_default LIKE 'nextval%' AND table_schema = 'public') LOOP EXECUTE 'SELECT setval(pg_get_serial_sequence(''' || r.table_name || ''', ''' || r.column_name || '''), COALESCE(MAX(' || r.column_name || '), 1)) FROM ' || r.table_name; END LOOP; END \$\$;"

    # ====================================================================
    # 3. REPLICATE DATABASE FOR TESTS
    # Clones POT_db into pot_test_db so tests run against isolated data.
    # ====================================================================
    - name: Create pot_test_db from Template
      run: |
        PSQL_ROOT="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/postgres"
        psql $PSQL_ROOT -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'pot_test_db';"
        psql $PSQL_ROOT -c "DROP DATABASE IF EXISTS pot_test_db;"
        psql $PSQL_ROOT -c "CREATE DATABASE pot_test_db WITH TEMPLATE \"POT_db\";"

    # ====================================================================
    # 4. RUN TESTS WITH COVERAGE
    # ====================================================================
    - name: Test with pytest
      run: |
        export DATABASE_URL="postgresql+asyncpg://postgres:devpassword@localhost:5432/pot_test_db"
        export TESTING=true
        uv run pytest

    - name: Fetch base branch and check for backend changes
      id: backend-changes
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin
        CHANGED=$(git diff --name-only origin/master...HEAD -- '**/*.py' | wc -l)
        echo "has_changes=$([ "$CHANGED" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

    - name: Diff coverage report
      id: diff-cover
      if: github.event_name == 'pull_request' && steps.backend-changes.outputs.has_changes == 'true'
      run: uv run diff-cover coverage.xml --compare-branch=origin/master --format markdown:diff-coverage.md

    - name: Trim coverage report to summary only
      if: github.event_name == 'pull_request' && steps.diff-cover.outcome == 'success'
      run: |
        python3 << 'EOF'
        import re
        with open('diff-coverage.md') as f:
            content = f.read()
        content = re.split(r'\n{2,}## backend/', content)[0].strip()
        with open('diff-coverage.md', 'w') as f:
            f.write(content)
        EOF

    - name: Save PR number
      if: github.event_name == 'pull_request'
      run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

    - name: Upload diff-coverage artifacts
      if: github.event_name == 'pull_request' && steps.diff-cover.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: diff-coverage
        path: |
          backend/diff-coverage.md
          backend/pr_number.txt
        retention-days: 1
